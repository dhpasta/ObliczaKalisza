services:

  db_init:
    container_name: db_init
    build: db_init

  app:
    image: app-app:latest
    container_name: oblicza_app
    build: .
    depends_on:
    - db_init
    ports:
      - "5000:5000"
    environment:
      TZ: Europe/Warsaw

  nginx: 
    image: nginx:latest
    volumes:
    - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
    - app
    ports:
    - "80:80"